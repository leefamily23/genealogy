<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Fix Orphaned Member</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      margin: 10px 0;
    }
    button:hover {
      background: #c0392b;
    }
    .info {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .success {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 4px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🔧 Fix Orphaned Member (ID: 31)</h1>
  
  <div class="info">
    <p><strong>Problem:</strong> Member ID 31 (李谭胜父) exists but isn't properly linked to the tree.</p>
    <p><strong>Solution:</strong> Delete this member from the database.</p>
  </div>
  
  <button id="deleteMember">🗑️ Delete Member ID 31</button>
  
  <div id="result"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAdVk1FlwZFawFOw1V_IO1r1qBi5sHXIZs",
      authDomain: "leefamilygenealogy.firebaseapp.com",
      projectId: "leefamilygenealogy",
      storageBucket: "leefamilygenealogy.firebasestorage.app",
      messagingSenderId: "142758582489",
      appId: "1:142758582489:web:ddb1e5cc386c5b94d886c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('deleteMember').addEventListener('click', async () => {
      const result = document.getElementById('result');
      result.innerHTML = '<p>Deleting member ID 31...</p>';
      
      try {
        await deleteDoc(doc(db, 'family', '31'));
        result.innerHTML = '<div class="success"><strong>✅ Success!</strong><br>Member ID 31 has been deleted.<br><br>You can now close this page and refresh the main family tree page.</div>';
      } catch (error) {
        result.innerHTML = `<div style="background: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px;"><strong>❌ Error:</strong><br>${error.message}</div>`;
      }
    });
  </script>
</body>
</html>
