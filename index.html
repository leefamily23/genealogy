<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>李家有谱</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <h1>🌳 李家有谱</h1>
    <p class="subtitle">Lee Family Genealogy Tree</p>

    <!-- Tab Navigation -->
    <div class="tab-navigation">
      <button id="tab-genealogy" class="tab-btn active">📜 族谱 (李姓)</button>
      <button id="tab-family-tree" class="tab-btn">🌳 家族树 (全部)</button>
    </div>

    <div class="controls">
      <button id="btn-zoom-in">＋</button>
      <button id="btn-zoom-out">－</button>
      <button id="btn-reset">⟳ 重置</button>
    </div>

    <div class="auth-controls">
      <span id="user-display-name" class="hidden"></span>
      <button id="btn-add-root" class="hidden btn-add-root">➕ 添加祖先</button>
      <button id="btn-manage-users" class="hidden btn-manage">👥 管理用户</button>
      <button id="btn-sign-out"     class="hidden btn-signout">登出</button>
      <button id="btn-sign-in"      class="btn-signin">登录 Google</button>
    </div>
    
    <!-- Build Info -->
    <div id="build-info" class="build-info">
      <span id="build-version">v1.0.0</span>
      <span id="build-commit">Loading...</span>
    </div>
  </header>

  <!-- Error banner -->
  <div id="error-banner" class="hidden">
    <span id="error-banner-text"></span>
    <button id="error-banner-close">✕</button>
  </div>

  <!-- Sidebar backdrop (mobile only) -->
  <div id="sidebar-backdrop"></div>

  <!-- Left Sidebar (Always visible on desktop, drawer on mobile) -->
  <div id="left-sidebar">
    <!-- Mobile close button -->
    <button id="sidebar-mobile-close" onclick="window.closeMobileSidebar()" style="display:none; position:absolute; top:10px; right:10px; background:none; border:none; font-size:1.4rem; cursor:pointer; color:#888; z-index:10;">✕</button>
    <div id="sidebar-content">
      <!-- Member Details Section -->
      <div id="sidebar-detail" class="sidebar-section">
        <h3>成员详情</h3>
        <div id="sidebar-detail-content">
          <p style="color: #999; text-align: center; padding: 20px;">
            点击家族成员查看详情
          </p>
        </div>
      </div>
      
      <!-- Recent Edits Section (Scrollable) -->
      <div id="sidebar-history" class="sidebar-section hidden">
        <h3>📋 最近编辑</h3>
        <ul id="sidebar-history-list"></ul>
      </div>
    </div>
  </div>

  <!-- Tree container -->
  <div id="tree-container">
    <svg id="tree-svg"><g id="tree-group"></g></svg>
  </div>

  <!-- Edit Form Modal -->
  <div id="edit-modal" class="hidden modal-overlay">
    <div class="modal-card">
      <h3 id="modal-title">Add Member</h3>
      <form id="member-form">
        <input type="hidden" id="f-id" />
        <input type="hidden" id="f-parent-id" />

        <!-- Spouse Selection (shown only when adding child to parent with multiple spouses) -->
        <div id="spouse-selection-container" class="hidden" style="margin-bottom: 15px; padding: 10px; background-color: #e8f4f8; border-radius: 4px; border-left: 4px solid #3498db;">
          <label style="font-weight: bold; color: #2c3e50;">
            👫 Select Other Parent (Spouse)
            <select id="f-spouse-selection" style="margin-top: 5px;">
              <option value="">-- Select Spouse --</option>
            </select>
          </label>
          <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px; margin-bottom: 0;">
            Choose which spouse is the other parent of this child
          </p>
        </div>

        <!-- Row 1: Name + Photo side by side -->
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; margin-bottom: 10px;">
          <div>
            <label>Chinese Name 中文名 *
              <input type="text" id="f-name" required placeholder="e.g. 李亚狗" />
              <span id="f-name-error" class="validation-error"></span>
            </label>
            <label>Nickname 昵称
              <input type="text" id="f-chinese" placeholder="e.g. Ah Kow" />
            </label>
          </div>
          <!-- Photo -->
          <div class="image-upload-container" style="display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 2px;">
            <div class="image-preview" style="width: 80px; height: 80px; border: 2px dashed #ccc; border-radius: 8px; display: none; overflow: hidden; background: #f9f9f9;"></div>
            <input type="file" class="image-file-input" accept="image/*" style="display: none;" />
            <button type="button" class="image-upload-btn" style="background: #3498db; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap;">
              📁 照片
            </button>
            <button type="button" class="image-remove-btn" style="background: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; display: none;">
              🗑️ 移除
            </button>
            <div class="upload-progress" style="width: 80px; height: 4px; background: #ecf0f1; border-radius: 2px; display: none; overflow: hidden;">
              <div style="height: 100%; background: #3498db; width: 0%; transition: width 0.3s;"></div>
            </div>
          </div>
        </div>

        <!-- Row 2: Gender + Lee Family side by side -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px;">
          <label>性别
            <select id="f-gender">
              <option value="male">男</option>
              <option value="female">女</option>
              <option value="unknown">未知</option>
            </select>
          </label>
          <label style="display: flex; flex-direction: column; justify-content: flex-end;">
            <div style="display: flex; align-items: center; gap: 8px; padding: 7px 10px; background-color: #fff8f0; border-radius: 6px; border: 2px solid #8b1a1a; height: 34px;">
              <input type="checkbox" id="f-lee-family-member" style="width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;" />
              <span style="font-weight: 600; color: #8b1a1a; font-size: 0.8rem;">李家成员</span>
            </div>
          </label>
        </div>

        <!-- Row 3: Birth + Death side by side -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px;">
          <label>出生年份/日期
            <input type="text" id="f-birth" placeholder="1950 或 1950/01/01" />
          </label>
          <label>去世年份/日期
            <input type="text" id="f-death" placeholder="如在世则留空" />
          </label>
        </div>

        <!-- Row 4: Hometown -->
        <label>籍贯 (Hometown)
          <input type="text" id="f-hometown" placeholder="e.g. 福建, 广东, 福州" />
        </label>

        <label>备注
          <textarea id="f-notes" rows="2" placeholder="任何备注..."></textarea>
        </label>
        <div class="modal-btns">
          <button type="submit" class="btn-save">💾 保存</button>
          <button type="button" id="modal-cancel" class="btn-cancel">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- User Management Modal -->
  <div id="user-mgmt-modal" class="hidden modal-overlay">
    <div class="modal-card modal-card-wide">
      <div class="modal-header">
        <h3>👥 Manage Users</h3>
        <button id="user-mgmt-close">✕</button>
      </div>

      <form id="invite-form" class="invite-form">
        <input type="email" id="invite-email" placeholder="Invite by email address" required />
        <button type="submit" class="btn-save">Invite as Editor</button>
      </form>

      <div id="user-list-container"></div>
    </div>
  </div>

  <!-- Search -->
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="搜索姓名..." />
    <button id="search-btn">🔍</button>
  </div>

  <!-- Image Viewer Modal -->
  <div id="image-viewer-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; cursor: pointer;">
    <div style="position: relative; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center;">
      <button id="image-viewer-close" style="position: absolute; top: -40px; right: 0; background: rgba(255,255,255,0.2); color: white; border: none; font-size: 30px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">✕</button>
      <img id="image-viewer-img" src="" alt="Full size" style="max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);" />
      <div id="image-viewer-name" style="color: white; font-size: 18px; font-weight: bold; margin-top: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);"></div>
    </div>
  </div>

  <!-- Username Prompt Modal (shown on first sign-in) -->
  <div id="username-modal" class="hidden modal-overlay" style="z-index: 9998;">
    <div class="modal-card" style="max-width: 380px; text-align: center;">
      <div style="font-size: 2rem; margin-bottom: 8px;">👋</div>
      <h3 style="margin-bottom: 6px;">欢迎！设置你的名字</h3>
      <p style="font-size: 0.85rem; color: #666; margin-bottom: 16px;">这个名字会显示在编辑记录中</p>
      <input type="text" id="username-input" placeholder="输入你的名字" 
             style="width:100%; padding: 10px; border: 2px solid #8b1a1a; border-radius: 8px; font-size: 1rem; text-align: center; outline: none; margin-bottom: 12px;" />
      <button id="username-confirm" class="btn-save" style="width: 100%; padding: 10px; font-size: 1rem;">确认</button>
    </div>
  </div>

  <!-- D3.js (non-module, loaded first) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <!-- App entry point (ES module) -->
  <script type="module" src="js/app.js"></script>

  <!-- Photo Lightbox -->
  <div id="photo-lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:12px;">
    <img id="photo-lightbox-img" src="" alt="" style="max-width:90vw; max-height:80vh; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,0.6); object-fit:contain;">
    <p id="photo-lightbox-name" style="color:#fff; font-size:1.1rem; font-weight:600; margin:0;"></p>
    <p style="color:#aaa; font-size:0.8rem; margin:0;">点击任意处关闭</p>
  </div>

  <script>
    window.openPhotoViewer = function(src, name) {
      const lb = document.getElementById('photo-lightbox');
      document.getElementById('photo-lightbox-img').src = src;
      document.getElementById('photo-lightbox-name').textContent = name;
      lb.style.display = 'flex';
    };
  </script>

</body>
</html>
